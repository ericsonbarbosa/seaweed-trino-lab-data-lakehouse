---
# ==============================================================================
# 1. INSTALAÇÃO DO POSTGRESQL E SERVIÇO
# ==============================================================================
- name: "Postgres : Instalar PostgreSQL"
  apt:
    name: postgresql
    state: present
  become: yes

- name: "Postgres : Garantir que o serviço está rodando"
  systemd:
    name: postgresql
    state: started
    enabled: yes
  become: yes

# ==============================================================================
# 2. DIRETÓRIO TEMPORÁRIO PARA EXECUÇÃO REMOTA DO ANSIBLE
# ==============================================================================
- name: "postgres : Criar diretório tmp para execução remota do Ansible"
  file:
    path: /var/lib/postgresql/.ansible/tmp
    state: directory
    owner: postgres
    group: postgres
    mode: '0755'
  become: yes

# ==============================================================================
# 3. CRIAÇÃO DO BANCO DE DADOS E USUÁRIO PARA O HIVE METASTORE
# ==============================================================================
- name: "Postgres : Criar banco de dados para o Hive Metastore"
  become: yes
  become_user: postgres
  postgresql_db:
    name: metastore

- name: "Postgres : Criar usuário 'hive' e definir senha"
  become: yes
  become_user: postgres
  no_log: true
  postgresql_user:
    name: hive
    password: hive_password
    encrypted: yes
    state: present

- name: "Postgres : Garantir privilégios 'ALL' no banco 'metastore' para o usuário 'hive'"
  become: yes
  become_user: postgres
  postgresql_privs:
    db: postgres       # Banco usado apenas para conectar e rodar o comando
    objs: metastore    # Nome do banco de dados alvo
    type: database     # Tipo do objeto que receberá o privilégio
    role: hive         # Usuário que está recebendo o poder
    privs: ALL         # Nível de privilégio
    state: present

# ==============================================================================
# 4. CONFIGURAÇÕES DE ACESSO EXTERNO (NECESSÁRIAS PARA O HMS)
# ==============================================================================
- name: "Postgres : Configurar acesso externo (necessário para o HMS)"
  lineinfile:
    path: /etc/postgresql/14/main/pg_hba.conf
    line: "host    metastore       hive            192.168.56.0/24         md5"
    insertafter: EOF
  become: yes
  notify: "restart postgres"

- name: "Postgres : Escutar em todas as interfaces"
  lineinfile:
    path: /etc/postgresql/14/main/postgresql.conf
    regexp: "^#?listen_addresses ="
    line: "listen_addresses = '*'"
  become: yes
  notify: "restart postgres"