---
# ==============================================================================
# 1. JAVA
# ==============================================================================
- name: "hive : Instalar Java 11 (para Hadoop)"
  apt:
    name: openjdk-11-jdk
    state: present
    update_cache: yes
  become: yes

- name: "hive : Instalar Java 17 (para Hive Metastore)"
  apt:
    name: openjdk-17-jdk
    state: present
  become: yes

- name: "hive : Definir JAVA_HOME do Hadoop no profile global"
  copy:
    dest: /etc/profile.d/hadoop_java.sh
    content: |
      export HADOOP_JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64
    mode: '0644'
  become: yes

# ==============================================================================
# 2. USUÁRIO E DIRETÓRIOS (COM HOME CRIADA)
# ==============================================================================
- name: "hive : Criar grupo hive"
  group:
    name: hive
    state: present
  become: yes

- name: "hive : Criar usuário hive (com home)"
  user:
    name: hive
    group: hive
    shell: /bin/bash
    create_home: yes
    state: present
  become: yes

- name: "hive : Criar diretórios necessários"
  file:
    path: "{{ item }}"
    state: directory
    owner: hive
    group: hive
    mode: '0755'
  loop:
    - "{{ install_dir }}/hive"
    - "/var/log/hive"
  become: yes

# ==============================================================================
# 3. INSTALAÇÃO DO HIVE
# ==============================================================================
- name: "hive : Verificar se o binário existe localmente"
  delegate_to: localhost
  become: no
  stat:
    path: "{{ role_path }}/files/apache-hive-{{ hive_version }}-bin.tar.gz"
  register: hive_file

- name: "hive : Validar existência do arquivo"
  fail:
    msg: "ERRO: Arquivo não encontrado em {{ role_path }}/files/apache-hive-{{ hive_version }}-bin.tar.gz"
  when: not hive_file.stat.exists

- name: "hive : Enviar e descompactar Apache Hive"
  unarchive:
    src: "apache-hive-{{ hive_version }}-bin.tar.gz"
    dest: "{{ install_dir }}"
    owner: hive
    group: hive
    creates: "{{ install_dir }}/apache-hive-{{ hive_version }}-bin/bin/hive"
  become: yes

- name: "hive : Criar link simbólico /opt/hive"
  file:
    src: "{{ install_dir }}/apache-hive-{{ hive_version }}-bin"
    dest: "{{ install_dir }}/hive"
    state: link
    force: yes
  become: yes

# ==============================================================================
# 4. DRIVERS E JARS (JDBC, S3A, GUAVA)
# ==============================================================================
- name: "hive : Baixar driver JDBC do PostgreSQL"
  get_url:
    url: "https://jdbc.postgresql.org/download/postgresql-42.7.3.jar"
    dest: "{{ install_dir }}/hive/lib/postgresql-42.7.3.jar"
    mode: '0644'
  become: yes

- name: "hive : Baixar hadoop-aws para suporte S3A"
  get_url:
    url: "https://repo1.maven.org/maven2/org/apache/hadoop/hadoop-aws/3.3.6/hadoop-aws-3.3.6.jar"
    dest: "{{ install_dir }}/hive/lib/hadoop-aws-3.3.6.jar"
    mode: '0644'
  become: yes

- name: "hive : Baixar aws-java-sdk-bundle"
  get_url:
    url: "https://repo1.maven.org/maven2/com/amazonaws/aws-java-sdk-bundle/1.12.262/aws-java-sdk-bundle-1.12.262.jar"
    dest: "{{ install_dir }}/hive/lib/aws-java-sdk-bundle-1.12.262.jar"
    mode: '0644'
  become: yes

- name: "hive : Remover guava antiga para evitar conflito"
  file:
    path: "{{ install_dir }}/hive/lib/guava-19.0.jar"
    state: absent
  become: yes

- name: "hive : Baixar guava compatível"
  get_url:
    url: "https://repo1.maven.org/maven2/com/google/guava/guava/27.0-jre/guava-27.0-jre.jar"
    dest: "{{ install_dir }}/hive/lib/guava-27.0-jre.jar"
    mode: '0644'
  become: yes

# ==============================================================================
# 5. CLIENTE HADOOP COMPLETO (via arquivo local)
# ==============================================================================
- name: "hive : Verificar se o Hadoop existe localmente"
  delegate_to: localhost
  become: no
  stat:
    path: "{{ role_path }}/files/hadoop-3.3.6.tar.gz"
  register: hadoop_file

- name: "hive : Validar existência do arquivo Hadoop"
  fail:
    msg: "ERRO: Arquivo não encontrado em {{ role_path }}/files/hadoop-3.3.6.tar.gz"
  when: not hadoop_file.stat.exists

- name: "hive : Enviar e descompactar Hadoop"
  unarchive:
    src: "hadoop-3.3.6.tar.gz"
    dest: "/opt"
    owner: root
    group: root
    creates: "/opt/hadoop-3.3.6/bin/hadoop"
  become: yes

- name: "hive : Criar link simbólico /opt/hadoop"
  file:
    src: "/opt/hadoop-3.3.6"
    dest: "/opt/hadoop"
    state: link
    force: yes
  become: yes

# ==============================================================================
# 6. CONFIGURAÇÃO (hive-site.xml e hive-env.sh)
# ==============================================================================
- name: "hive : Aplicar hive-site.xml"
  template:
    src: hive-site.xml.j2
    dest: "{{ install_dir }}/hive/conf/hive-site.xml"
    owner: hive
    group: hive
    mode: '0644'
  become: yes

- name: "hive : Configurar hive-env.sh"
  copy:
    dest: "{{ install_dir }}/hive/conf/hive-env.sh"
    owner: hive
    group: hive
    mode: '0644'
    content: |
      export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
      export HIVE_HOME={{ install_dir }}/hive
      export HADOOP_HOME=/opt/hadoop
      export HADOOP_HEAPSIZE=1024
  become: yes

# ==============================================================================
# 7. CRIAR BUCKET WAREHOUSE NO SEAWEEDFS (VIA AWS CLI)
# ==============================================================================
- name: "hive : Instalar AWS CLI"
  apt:
    name: awscli
    state: present
  become: yes

- name: "hive : Criar bucket warehouse no SeaweedFS S3"
  shell: |
    aws --endpoint-url {{ seaweedfs_s3_endpoint }} \
        s3 mb s3://{{ seaweedfs_s3_warehouse_bucket }}
  environment:
    AWS_ACCESS_KEY_ID: "{{ seaweedfs_s3_access_key }}"
    AWS_SECRET_ACCESS_KEY: "{{ seaweedfs_s3_secret_key }}"
  register: bucket_create
  failed_when: bucket_create.rc != 0 and "BucketAlreadyExists" not in bucket_create.stderr
  changed_when: bucket_create.rc == 0
  become: no

# ==============================================================================
# 8. INICIALIZAR SCHEMA DO METASTORE (COM HADOOP E JAVA 11)
# ==============================================================================
- name: "hive : Inicializar schema do Metastore no PostgreSQL"
  shell: |
    {{ install_dir }}/hive/bin/schematool \
      -dbType postgres \
      -initSchema \
      -verbose
  environment:
    JAVA_HOME: "/usr/lib/jvm/java-11-openjdk-amd64"
    HIVE_HOME: "{{ install_dir }}/hive"
    HADOOP_HOME: "/opt/hadoop"
    PATH: "/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:{{ install_dir }}/hive/bin:/opt/hadoop/bin"
    HADOOP_CLIENT_OPTS: "-Xmx256m"
  args:
    creates: "/tmp/.hive_schema_initialized"
  register: schema_init
  failed_when:
    - schema_init.rc != 0
    - "'already exists' not in schema_init.stderr"
  become: yes
  become_user: hive

- name: "hive : Marcar schema como inicializado"
  file:
    path: /tmp/.hive_schema_initialized
    state: touch
  become: yes
  when: schema_init.rc == 0

# ==============================================================================
# 9. SERVIÇO SYSTEMD DO METASTORE
# ==============================================================================
- name: "hive : Instalar unit do Hive Metastore"
  template:
    src: hive-metastore.service.j2
    dest: /etc/systemd/system/hive-metastore.service
    mode: '0644'
  become: yes
  notify: "restart hive-metastore"

- name: "hive : Recarregar systemd"
  systemd:
    daemon_reload: yes
  become: yes

- name: "hive : Iniciar e habilitar Hive Metastore"
  systemd:
    name: hive-metastore
    state: started
    enabled: yes
  become: yes

- name: "hive : Aguardar Metastore abrir porta 9083"
  wait_for:
    host: "192.168.56.101"
    port: "{{ hive_metastore_port }}"
    delay: 5
    timeout: 120

# ==============================================================================
# 10. PATH GLOBAL
# ==============================================================================
- name: "hive : Adicionar Hive ao PATH global"
  copy:
    dest: /etc/profile.d/hive_path.sh
    content: |
      export HIVE_HOME={{ install_dir }}/hive
      export PATH=$PATH:$HIVE_HOME/bin
    mode: '0644'
  become: yes